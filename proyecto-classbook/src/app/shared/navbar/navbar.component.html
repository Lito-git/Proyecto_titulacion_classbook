<!-- Navbar lateral compartida para todos los roles -->
<nav class="navbar">

    <!-- Logo y título -->
    <div class="navbar-logo">
        <img src="classbook_logo.png" alt="ClassBook" class="navbar-logo-img" />
        <span class="navbar-logo-texto">ClassBook</span>
    </div>

    <!-- Info del usuario -->
    <div class="navbar-usuario">
        <div class="navbar-usuario-avatar">{{ nombre[0] }}{{ apellido[0] }}</div>
        <div class="navbar-usuario-info">
            <span class="navbar-usuario-nombre">{{ nombre }} {{ apellido }}</span>
            <span class="navbar-usuario-rol">{{ getRolSubtitulo() }}</span>
        </div>
    </div>

    <!-- Links de navegación -->
    <ul class="navbar-links">
        <li *ngFor="let link of links">
            <a [routerLink]="link.ruta" routerLinkActive="activo"
                [routerLinkActiveOptions]="{exact: link.ruta === rutaBase}">
                <!-- Icono SVG renderizado dinámicamente -->
                <span [innerHTML]="link.icono"></span>
                {{ link.label }}
            </a>
        </li>
    </ul>

    <!-- Cerrar sesión -->
    <div class="navbar-footer">
        <button class="btn-cerrar-sesion" (click)="cerrarSesion()">
            <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none"
                stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                <path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4" />
                <polyline points="16 17 21 12 16 7" />
                <line x1="21" y1="12" x2="9" y2="12" />
            </svg>
            Cerrar sesión
        </button>
    </div>

</nav>
