<!-- Layout principal -->
<div class="layout">

    <!-- Navbar lateral -->
    <app-navbar></app-navbar>

    <!-- Contenido principal -->
    <main class="contenido">

        <!-- Encabezado -->
        <div class="encabezado">
            <div>
                <h1 class="titulo">Gestión de Cursos</h1>
                <p class="subtitulo">Administra los cursos del establecimiento</p>
            </div>
            <button class="btn-crear" (click)="abrirModalCrear()">+ Crear Curso</button>
        </div>

        <!-- Mensajes -->
        <p class="exito" *ngIf="mensajeExito">{{ mensajeExito }}</p>
        <p class="error" *ngIf="mensajeError">{{ mensajeError }}</p>

        <!-- Grid de tarjetas de cursos -->
        <div class="grid-cursos">
            <div class="tarjeta-curso" *ngFor="let curso of cursos">

                <h3 class="curso-nombre">{{ curso.curso_nombre }}</h3>

                <!-- Estudiantes matriculados -->
                <div class="curso-estudiantes">
                    <strong class="curso-estudiantes-numero">{{ curso.total_estudiantes }}</strong>
                    <span class="curso-estudiantes-label">Estudiantes matriculados</span>
                </div>

                <!-- Acciones -->
                <div class="curso-acciones">
                    <button class="btn-editar" (click)="abrirModalEditar(curso)">
                        <svg xmlns="http://www.w3.org/2000/svg" width="14" height="14" viewBox="0 0 24 24" fill="none"
                            stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                            <path d="M11 4H4a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2v-7" />
                            <path d="M18.5 2.5a2.121 2.121 0 0 1 3 3L12 15l-4 1 1-4 9.5-9.5z" />
                        </svg>
                        Editar
                    </button>
                    <button class="btn-eliminar" (click)="eliminarCurso(curso.curso_id)">
                        <svg xmlns="http://www.w3.org/2000/svg" width="14" height="14" viewBox="0 0 24 24" fill="none"
                            stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                            <polyline points="3 6 5 6 21 6" />
                            <path d="M19 6l-1 14a2 2 0 0 1-2 2H8a2 2 0 0 1-2-2L5 6" />
                            <path d="M10 11v6M14 11v6" />
                            <path d="M9 6V4a1 1 0 0 1 1-1h4a1 1 0 0 1 1 1v2" />
                        </svg>
                        Eliminar
                    </button>
                </div>

            </div>
        </div>

        <!-- Modal crear/editar curso -->
        <div class="modal-overlay" *ngIf="mostrarModal" (click)="cerrarModal()">
            <div class="modal" (click)="$event.stopPropagation()">
                <h2 class="modal-titulo">{{ modoEdicion ? 'Editar Curso' : 'Crear Curso' }}</h2>

                <div class="campo">
                    <label>Nombre del curso (Letra)</label>
                    <input type="text" [(ngModel)]="formulario.nombre" placeholder="Ej: A" />
                </div>
                <div class="campo">
                    <label>Nivel</label>
                    <select [(ngModel)]="formulario.nivel">
                        <option value="" disabled>Selecciona un nivel</option>
                        <option value="1° Básico">1° Básico</option>
                        <option value="2° Básico">2° Básico</option>
                        <option value="3° Básico">3° Básico</option>
                        <option value="4° Básico">4° Básico</option>
                        <option value="5° Básico">5° Básico</option>
                        <option value="6° Básico">6° Básico</option>
                        <option value="7° Básico">7° Básico</option>
                        <option value="8° Básico">8° Básico</option>
                    </select>
                </div>

                <p class="exito" *ngIf="mensajeExito">{{ mensajeExito }}</p>
                <p class="error" *ngIf="mensajeError">{{ mensajeError }}</p>

                <div class="modal-acciones">
                    <button class="btn-cancelar" (click)="cerrarModal()">Cancelar</button>
                    <button class="btn-guardar" (click)="guardarCurso()" [disabled]="cargando">
                        {{ cargando ? 'Guardando...' : 'Guardar' }}
                    </button>
                </div>
            </div>
        </div>

    </main>
</div>
