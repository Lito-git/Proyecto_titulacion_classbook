<!-- Navbar lateral del panel administrador -->
<nav class="navbar">

    <!-- Logo y título -->
    <div class="navbar-logo">
        <img src="classbook_logo.png" alt="ClassBook" class="navbar-logo-img" />
        <span class="navbar-logo-texto">ClassBook</span>
    </div>

    <!-- Info del usuario -->
    <div class="navbar-usuario">
        <div class="navbar-usuario-avatar">{{ nombre[0] }}{{ apellido[0] }}</div>
        <div class="navbar-usuario-info">
            <span class="navbar-usuario-nombre">{{ nombre }} {{ apellido }}</span>
            <span class="navbar-usuario-rol">Administrador</span>
        </div>
    </div>

    <!-- Links de navegación -->
    <ul class="navbar-links">
        <li>
            <a routerLink="/administrador" routerLinkActive="activo" [routerLinkActiveOptions]="{exact: true}">
                <!-- Dashboard -->
                <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none"
                    stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                    <rect x="3" y="3" width="7" height="7" />
                    <rect x="14" y="3" width="7" height="7" />
                    <rect x="3" y="14" width="7" height="7" />
                    <rect x="14" y="14" width="7" height="7" />
                </svg>
                Dashboard
            </a>
        </li>
        <li>
            <a routerLink="/administrador/usuarios" routerLinkActive="activo">
                <!-- Usuarios -->
                <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none"
                    stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                    <path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2" />
                    <circle cx="9" cy="7" r="4" />
                    <path d="M23 21v-2a4 4 0 0 0-3-3.87" />
                    <path d="M16 3.13a4 4 0 0 1 0 7.75" />
                </svg>
                Gestión de Usuarios
            </a>
        </li>
        <li>
            <a routerLink="/administrador/cursos" routerLinkActive="activo">
                <!-- Cursos -->
                <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none"
                    stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                    <path d="M4 19.5A2.5 2.5 0 0 1 6.5 17H20" />
                    <path d="M6.5 2H20v20H6.5A2.5 2.5 0 0 1 4 19.5v-15A2.5 2.5 0 0 1 6.5 2z" />
                </svg>
                Gestión de Cursos
            </a>
        </li>
        <li>
            <a routerLink="/administrador/asignaturas" routerLinkActive="activo">
                <!-- Asignaturas -->
                <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none"
                    stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                    <path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z" />
                    <polyline points="14 2 14 8 20 8" />
                    <line x1="16" y1="13" x2="8" y2="13" />
                    <line x1="16" y1="17" x2="8" y2="17" />
                    <polyline points="10 9 9 9 8 9" />
                </svg>
                Gestión de Asignaturas
            </a>
        </li>
        <li>
            <a routerLink="/administrador/historial" routerLinkActive="activo">
                <!-- Historial -->
                <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none"
                    stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                    <circle cx="12" cy="12" r="10" />
                    <polyline points="12 6 12 12 16 14" />
                </svg>
                Historial de Cambios
            </a>
        </li>
        <li>
            <a routerLink="/administrador/cambiar-contrasena" routerLinkActive="activo">
                <!-- Cambiar contraseña -->
                <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none"
                    stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                    <rect x="3" y="11" width="18" height="11" rx="2" ry="2" />
                    <path d="M7 11V7a5 5 0 0 1 10 0v4" />
                </svg>
                Cambiar Contraseña
            </a>
        </li>
    </ul>

    <!-- Cerrar sesión -->
    <div class="navbar-footer">
        <button class="btn-cerrar-sesion" (click)="cerrarSesion()">
            <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none"
                stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                <path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4" />
                <polyline points="16 17 21 12 16 7" />
                <line x1="21" y1="12" x2="9" y2="12" />
            </svg>
            Cerrar sesión
        </button>
    </div>

</nav>
